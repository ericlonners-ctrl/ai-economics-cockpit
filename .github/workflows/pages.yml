name: Build and publish dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Build cockpit
        run: python -m ai_economics_cockpit all --online

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -R dashboard _site/dashboard
          mkdir -p _site/data/processed
          cp data/processed/dashboard_payload.json _site/data/processed/dashboard_payload.json
          cp artifacts/latest_dashboard_build_report.md _site/latest_dashboard_build_report.md

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
